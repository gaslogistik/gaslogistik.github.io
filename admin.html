<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KP GASLOGISTIK - Admin</title>

<link rel="stylesheet" href="enterprise-v22.css">

<style>
@media (max-width: 900px){
.layout{display:block!important}.sidebar:not(.open){display:none!important}.sidebar.open{display:block!important}
.dashboard-main,.main-content,.content{width:100%!important}
.dashboard-main,.main-content,.content{width:100%!important}
table{display:block;overflow-x:auto;white-space:nowrap}
input,select,button,textarea{max-width:100%;box-sizing:border-box}
.card,.tile,.admcard{min-width:140px!important}
}
@media (max-width: 600px){
h1,h2,h3{word-break:break-word}
.card,.tile,.admcard{width:100%!important}
.menu a{display:block;padding:12px}
}
</style>


<style id="v5-mobile-native">
@media (max-width:768px){
body{font-size:15px}
.shell{margin:0;padding:8px;border-radius:0}
.top{grid-template-columns:1fr; height:auto}
.headercenter,.right{padding:10px;justify-content:center;flex-wrap:wrap}
.layout{display:block!important}.sidebar:not(.open){display:none!important}.sidebar.open{display:block!important}
.sidebar{position:fixed;left:-280px;top:0;width:260px!important;height:100vh;z-index:9999;overflow:auto;transition:.3s;background:#e5e5e5;padding-top:70px}
.sidebar.open{left:0}
.mobile-menu-btn{display:flex!important;position:fixed;top:12px;left:12px;z-index:10000;background:#222;color:#fff;border:none;border-radius:12px;padding:12px 14px}
.dashboard-grid,.cards,.tiles{grid-template-columns:1fr!important}
.card,.tile,.admcard,.panel{width:100%!important}
table{display:block;overflow:auto}
.matrix-container{height:78vh}
#matrix th.rotate{min-width:90px!important;width:90px!important}
#matrix .hub{min-width:120px!important}
.map-controls,.filters{display:flex;flex-direction:column;gap:8px}
}
@media (min-width:769px){.mobile-menu-btn{display:none!important}}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
 const sb=document.querySelector('.sidebar');
 if(!sb) return;
 const b=document.createElement('button');
 b.className='mobile-menu-btn';
 b.innerHTML='☰';
 document.body.appendChild(b);
 b.onclick=()=>sb.classList.toggle('open');
 document.addEventListener('click',e=>{
   if(window.innerWidth<=768 && sb.classList.contains('open') && !sb.contains(e.target) && !b.contains(e.target)){sb.classList.remove('open');}
 });
});
</script>

<style id="admin-calendar-mobile-premium">
@media (max-width:768px){

  h4 + div[style*="grid-template-columns:1fr 1fr"]{
    display:grid !important;
    grid-template-columns:1fr !important;
    gap:16px !important;
  }

  .calendar-card{
    width:100% !important;
    padding:16px !important;
    border-radius:20px !important;
    box-sizing:border-box !important;
  }

  .calendar-card h5{
    font-size:18px !important;
    text-align:center !important;
    margin-bottom:14px !important;
  }

  .calendar-card table{
    width:100% !important;
    font-size:13px !important;
    border-spacing:4px !important;
  }

  .calendar-card td{
    min-height:34px !important;
    height:34px !important;
    padding:8px 4px !important;
    font-size:13px !important;
    font-weight:600 !important;
  }

  .calendar-card th{
    padding:6px 2px !important;
    font-size:12px !important;
  }
}
</style>
