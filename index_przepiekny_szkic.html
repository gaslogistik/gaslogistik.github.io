<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Dashboard Rebuild</title>
<style>
body{margin:0;background:#dcdcdc;font-family:Arial,sans-serif}
.wrapper{display:grid;grid-template-columns:110px 1fr;gap:8px;padding:6px}
.sidebar{background:#d8d8d8;border-radius:12px;padding:8px}
.menu{background:#ececec;border:1px solid #bbb;border-radius:8px;padding:10px;margin:6px 0;font-size:11px}
.main{background:#d8d8d8;border-radius:12px;padding:10px}
.topnav{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:10px}
.btn{background:linear-gradient(#ff4bc5,#c40086);color:#fff;text-align:center;padding:16px;border-radius:14px;font-weight:bold}
.content{display:grid;grid-template-columns:54% 46%;gap:14px}
.left-top{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel{background:#e8e8e8;border:1px solid #bdbdbd;border-radius:14px;min-height:120px;padding:10px}
.map{min-height:250px}
.lower{display:grid;grid-template-columns:54% 46%;gap:14px;margin-top:14px}
.status-area{display:flex;flex-direction:column;gap:10px}
.status-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.status{height:64px}
.uptime{min-height:260px}
.empty{min-height:140px}
h4{margin:0 0 8px}
.center{text-align:center}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<div class="menu">DASHBOARD</div>
<div class="menu">MATRIX</div>
<div class="menu">MAP</div>
<div class="menu">VEHICLES</div>
<div class="menu">ADDRESSES</div>
<div class="menu">ADMIN</div>
<div class="menu">CONTACT</div>
<div class="menu">DRIVERS</div>
</div>

<div class="main">
<div class="topnav">
<div class="btn">DASHBOARD</div>
<div class="btn">MATRIX</div>
<div class="btn">MAP</div>
<div class="btn">VEHICLES</div>
<div class="btn">ADDRESSES</div>
<div class="btn">ADMIN</div>
</div>

<div class="content">
<div class="left-top">
<div class="panel"><h4>SHIPMENTS OVERVIEW</h4></div>
<div class="panel"><h4>PERFORMANCE TREND</h4></div>
<div class="panel"><h4>FLEET STATUS</h4></div>
<div class="panel"><h4>DELIVERY KPI</h4></div>
</div>
<div class="panel map"><h4>GLOBAL OVERVIEW</h4></div>
</div>

<div class="lower">
<div class="status-area">
<div class="status-row">
<div class="panel status">SYSTEM STATUS</div>
<div class="panel status">DATABASE</div>
<div class="panel status">API SERVICES</div>
<div class="panel status">STORAGE</div>
</div>
<div class="status-row">
<div class="panel status"></div><div class="panel status"></div><div class="panel status"></div><div class="panel status"></div>
</div>
<div class="status-row">
<div class="panel status"></div><div class="panel status"></div><div class="panel status"></div><div class="panel status"></div>
</div>
</div>

<div>
<div class="panel uptime">
<h4 class="center">UPTIME</h4>
<p class="center">TODAY IN LOGISTICS</p>
</div>
<div class="panel empty"></div>
</div>
</div>

</div>
</div>
</body>
</html>
